openapi: 3.0.3
info:
  title: Go API Skeleton
  version: 1.0.0
  description: OpenAPI contract for the reusable Go API skeleton.
  license:
    name: MIT
    url: https://opensource.org/license/mit
servers:
  - url: /
security: []
tags:
  - name: Utility
    description: Utility endpoints.
  - name: Health
    description: Kubernetes probe endpoints.
paths:
  /v1/ping:
    get:
      operationId: getPing
      tags:
        - Utility
      summary: Ping endpoint for connectivity checks.
      security: []
      responses:
        '200':
          description: Pong response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/hello:
    get:
      operationId: getHello
      tags:
        - Utility
      summary: Hello world endpoint for connectivity checks.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Hello response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /livez:
    get:
      operationId: getLivez
      tags:
        - Health
      summary: Kubernetes liveness probe endpoint.
      security: []
      responses:
        '200':
          description: Service process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /readyz:
    get:
      operationId: getReadyz
      tags:
        - Health
      summary: Kubernetes readiness probe endpoint.
      security: []
      responses:
        '200':
          description: Service is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service is not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    PingResponse:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
          example: pong
        timestamp:
          type: string
          format: date-time
    HelloResponse:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
          example: hello world
        timestamp:
          type: string
          format: date-time
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
            - not_ready
        service:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
