get:
  operationId: getPing
  tags: [Utility]
  summary: Ping endpoint for connectivity checks.
  security: []
  responses:
    '200':
      description: Pong response.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PingResponse.yaml
    '400':
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '500':
      description: Unexpected error.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
