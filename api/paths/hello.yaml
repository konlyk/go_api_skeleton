get:
  operationId: getHello
  tags: [Utility]
  summary: Hello world endpoint for connectivity checks.
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Hello response.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HelloResponse.yaml
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '400':
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '500':
      description: Unexpected error.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
